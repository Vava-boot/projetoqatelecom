## Blueprint do Render — provisiona o back-end (e, opcionalmente, o Postgres)
## com um clique em "New > Blueprint" no painel do Render, apontando para
## este repositório. Ver README.md para o passo a passo completo.
##
## O front-end (Vite/React) NÃO é definido aqui: ele é implantado na Vercel
## separadamente (import do repositório, Root Directory = frontend/).

services:
  - type: web
    name: qa-telecom-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false # defina manualmente no painel do Render (nunca versione a chave)
      - key: ALLOWED_ORIGINS
        sync: false # ex.: https://qa-telecom.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: qa-telecom-db
          property: connectionString

databases:
  - name: qa-telecom-db
    plan: free
    region: oregon
